general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/danielemoggia/.config/assets/backgrounds/cat_leaves_blurred.png
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(166, 173, 200, 255)
    inner_color = rgba(17, 17, 27, 255)
    font_color = rgba(166, 173, 200, 255)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = rgba(204, 136, 34, 255)
    fail_color = rgba(204, 34, 34, 255)
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(166, 173, 200, 255)
    font_size = 55
    font_family = Fira Sans SemiBold
    position = -100, 40
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

label {
    monitor =
    text = Hello
    color = rgba(166, 173, 200, 255)
    font_size = 20
    font_family = Fira Sans SemiBold
    position = -100, 160
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

image {
    monitor =
    path = /home/danielemoggia/.config/assets/backgrounds/cat_pacman.png
    size = 280
    rounding = -1
    border_size = 4
    border_color = rgba(166, 173, 200, 255)
    rotate = 0
    position = 0, 200
    halign = center
    valign = center
}
