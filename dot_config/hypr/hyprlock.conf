label {
    monitor =
    text = $TIME
    color = rgba(166, 173, 200, 255)
    font_size = 55
    font_family = Fira Sans SemiBold
    position = -100, 40
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

label {
    monitor =
    text = Hello
    color = rgba(166, 173, 200, 255)
    font_size = 20
    font_family = Fira Sans SemiBold
    position = -100, 160
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

image {
    monitor =
    path = /home/danielemoggia/.config/assets/backgrounds/cat_pacman.png
    size = 280
    rounding = -1
    border_size = 4
    border_color = rgba(166, 173, 200, 255)
    rotate = 0
    position = 0, 200
    halign = center
    valign = center
}

auth { 
  fingerprint:enabled = false
